name: Auto-Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [linux-x64, win-x64, osx-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KazoOCR.sln

      - name: Build in Release mode
        run: dotnet build KazoOCR.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish CLI for ${{ matrix.runtime }}
        run: |
          dotnet publish src/KazoOCR.CLI/KazoOCR.CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            --output ./publish/${{ matrix.runtime }}

      - name: Create archive (Linux/macOS)
        if: matrix.runtime != 'win-x64'
        run: |
          cd ./publish/${{ matrix.runtime }}
          tar -czvf ../kazoocr-${{ matrix.runtime }}.tar.gz .

      - name: Create archive (Windows)
        if: matrix.runtime == 'win-x64'
        run: |
          cd ./publish/${{ matrix.runtime }}
          zip -r ../kazoocr-${{ matrix.runtime }}.zip .

      - name: Upload artifact (Linux/macOS)
        if: matrix.runtime != 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: kazoocr-${{ matrix.runtime }}
          path: ./publish/kazoocr-${{ matrix.runtime }}.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.runtime == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: kazoocr-${{ matrix.runtime }}
          path: ./publish/kazoocr-${{ matrix.runtime }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: ./artifacts
          pattern: kazoocr-*
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
