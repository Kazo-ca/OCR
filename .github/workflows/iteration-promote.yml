name: "Promote Next Iteration"

# Runs when a PR is merged, when an issue is closed, or manually.
# Stateless: checks the current label state rather than relying on the event payload.
# Three triggers because timing gaps exist between each event:
#   - pull_request closed: fires when the PR merges, before linked issues are closed
#   - issues closed: fires when the linked issue is actually closed (may lag behind PR)
#   - workflow_dispatch: manual safety net / re-run after corrections
on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]
  workflow_dispatch:

permissions:
  issues: write   # required to add the Ready label

jobs:
  promote:
    # On PR events, only run when the PR was actually merged (not just closed/abandoned)
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Apply Ready label to next iteration issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const READY_LABEL  = "Ready";
            const ONHOLD_LABEL = "OnHold";
            const ITER_PATTERN = /^iteration-(\d+)$/;

            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // --- 1. Check if any open issues already carry the Ready label ---
            const readyIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              labels: READY_LABEL,
              state: "open",
              per_page: 100
            });

            const activeReady = readyIssues.filter(i => !i.labels.some(l => l.name === ONHOLD_LABEL));

            if (activeReady.length > 0) {
              core.info(
                `${activeReady.length} open issue(s) still have the Ready label: ` +
                activeReady.map(i => `#${i.number}`).join(", ") +
                ". Nothing to promote."
              );
              return;
            }

            core.info("No open Ready issues found. Looking for the next iteration to promote...");

            // --- 2. Find the lowest iteration-X that has open, non-OnHold issues ---
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: "open",
              per_page: 100
            });

            let minIter = null;
            for (const issue of openIssues) {
              if (issue.labels.some(l => l.name === ONHOLD_LABEL)) continue;
              for (const label of issue.labels) {
                const m = ITER_PATTERN.exec(label.name);
                if (m) {
                  const n = parseInt(m[1], 10);
                  if (minIter === null || n < minIter) minIter = n;
                }
              }
            }

            if (minIter === null) {
              core.info("No open issues with an iteration label found. Nothing to promote.");
              return;
            }

            const nextIterLabel = `iteration-${minIter}`;
            core.info(`Next iteration to promote: ${nextIterLabel}`);

            // --- 3. Apply Ready label to all open non-OnHold issues in that iteration ---
            const toPromote = openIssues.filter(i =>
              !i.labels.some(l => l.name === ONHOLD_LABEL) &&
              i.labels.some(l => l.name === nextIterLabel)
            );

            for (const issue of toPromote) {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: [READY_LABEL]
              });
              core.info(`  ✓ #${issue.number} "${issue.title}" → ${READY_LABEL}`);
            }

            core.info(`Promoted ${toPromote.length} issue(s) from ${nextIterLabel}.`);


