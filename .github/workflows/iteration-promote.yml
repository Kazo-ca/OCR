name: "Promote Next Iteration"

on:
  issues:
    types: [closed]

permissions:
  issues: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Promote next iteration items from Backlog to Todo
        uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_ID = "PVT_kwDOD_m3A84BU243";
            const STATUS_FIELD_ID = "PVTSSF_lADOD_m3A84BU243zhGUPds";
            const ITERATION_FIELD_ID = "PVTIF_lADOD_m3A84BU243zhGXjjc";

            // --- 1. Fetch all project items with their Status and Iteration ---
            const query = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { number title state }
                        ... on DraftIssue { title }
                      }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { name id } }
                            name
                            optionId
                          }
                          ... on ProjectV2ItemFieldIterationValue {
                            field { ... on ProjectV2IterationField { name id } }
                            title
                            iterationId
                            startDate
                            duration
                          }
                        }
                      }
                    }
                  }
                  statusField: field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      options { id name }
                    }
                  }
                  iterationField: field(name: "Iteration") {
                    ... on ProjectV2IterationField {
                      configuration {
                        iterations { id title startDate duration }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, { projectId: PROJECT_ID });
            const project = result.node;

            // --- 2. Parse status options ---
            const statusOptions = {};
            for (const opt of project.statusField?.options || []) {
              statusOptions[opt.name] = opt.id;
            }
            const BACKLOG_ID = statusOptions["Backlog"];
            const TODO_ID = statusOptions["Todo"];
            if (!BACKLOG_ID || !TODO_ID) {
              core.info("Missing Backlog or Todo status option. Skipping.");
              return;
            }

            // --- 3. Get sorted iterations ---
            // Fetch from the second field query (Iteration)
            const iterQuery = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  iterationField: field(name: "Iteration") {
                    ... on ProjectV2IterationField {
                      configuration {
                        iterations { id title startDate duration }
                      }
                    }
                  }
                }
              }
            }`;
            const iterResult = await github.graphql(iterQuery, { projectId: PROJECT_ID });
            const iterations = iterResult.node.iterationField?.configuration?.iterations || [];
            iterations.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            core.info(`Found ${iterations.length} iterations: ${iterations.map(i => i.title).join(", ")}`);

            // --- 4. Build a map: iterationId -> [items] ---
            const items = project.items.nodes;
            const iterationItems = {};
            for (const iter of iterations) {
              iterationItems[iter.id] = [];
            }

            for (const item of items) {
              let itemIterId = null;
              let itemStatus = null;
              for (const fv of item.fieldValues.nodes) {
                if (fv.iterationId) itemIterId = fv.iterationId;
                if (fv.optionId && fv.field?.name === "Status") itemStatus = fv.name;
              }
              if (itemIterId && iterationItems[itemIterId]) {
                iterationItems[itemIterId].push({
                  id: item.id,
                  status: itemStatus,
                  title: item.content?.title || "(draft)",
                  state: item.content?.state || "UNKNOWN"
                });
              }
            }

            // --- 5. Find which iteration the closed issue belongs to ---
            const closedIssueNumber = context.payload.issue.number;
            let closedIterationId = null;

            for (const item of items) {
              if (item.content?.number === closedIssueNumber) {
                for (const fv of item.fieldValues.nodes) {
                  if (fv.iterationId) closedIterationId = fv.iterationId;
                }
              }
            }

            if (!closedIterationId) {
              core.info(`Issue #${closedIssueNumber} is not in any iteration. Skipping.`);
              return;
            }

            const closedIter = iterations.find(i => i.id === closedIterationId);
            core.info(`Issue #${closedIssueNumber} belongs to iteration "${closedIter?.title}"`);

            // --- 6. Check if ALL items in that iteration are Done (closed) ---
            const iterItems = iterationItems[closedIterationId] || [];
            const allDone = iterItems.every(i => i.status === "Done" || i.state === "CLOSED");

            if (!allDone) {
              const remaining = iterItems.filter(i => i.status !== "Done" && i.state !== "CLOSED");
              core.info(`Iteration "${closedIter?.title}" still has ${remaining.length} open item(s): ${remaining.map(i => i.title).join(", ")}`);
              core.info("Not all items are Done. Skipping promotion.");
              return;
            }

            core.info(`All items in "${closedIter?.title}" are Done!`);

            // --- 7. Find the NEXT iteration ---
            const currentIdx = iterations.findIndex(i => i.id === closedIterationId);
            if (currentIdx === -1 || currentIdx >= iterations.length - 1) {
              core.info("No next iteration found. Nothing to promote.");
              return;
            }

            const nextIter = iterations[currentIdx + 1];
            core.info(`Promoting items from "${nextIter.title}" (Backlog → Todo)`);

            // --- 8. Promote: set Status from Backlog to Todo ---
            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }`;

            const nextItems = iterationItems[nextIter.id] || [];
            let promoted = 0;
            for (const item of nextItems) {
              if (item.status === "Backlog") {
                await github.graphql(mutation, {
                  projectId: PROJECT_ID,
                  itemId: item.id,
                  fieldId: STATUS_FIELD_ID,
                  optionId: TODO_ID
                });
                core.info(`  ✓ "${item.title}" → Todo`);
                promoted++;
              }
            }

            core.info(`Promoted ${promoted} item(s) from "${nextIter.title}" to Todo.`);

            // --- 9. Also set completed iteration items to Done status (belt & suspenders) ---
            for (const item of iterItems) {
              if (item.status !== "Done") {
                await github.graphql(mutation, {
                  projectId: PROJECT_ID,
                  itemId: item.id,
                  fieldId: STATUS_FIELD_ID,
                  optionId: statusOptions["Done"]
                });
                core.info(`  ✓ "${item.title}" → Done (sync)`);
              }
            }
