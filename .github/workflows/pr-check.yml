name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Minimal permissions for security
permissions:
  contents: read

# Skip for draft PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.draft == false
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KazoOCR.sln

      - name: Build (skip MAUI on Ubuntu)
        run: dotnet build KazoOCR.sln --no-restore --configuration Release /p:BuildMAUI=${{ matrix.os == 'windows-latest' }}

  test:
    if: github.event.pull_request.draft == false
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KazoOCR.sln

      - name: Test with coverage
        run: dotnet test --configuration Release --verbosity normal /p:BuildMAUI=${{ matrix.os == 'windows-latest' }} --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/**/coverage.cobertura.xml
          retention-days: 7
